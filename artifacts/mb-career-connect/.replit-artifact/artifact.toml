kind = "web"
previewPath = "/"
title = "MB Career Connect"
version = "1.0.0"
id = "artifacts/mb-career-connect"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21639

[services.development]
run = "pnpm --filter @workspace/mb-career-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mb-career-connect", "run", "build" ]
serve = "static"
publicDir = "artifacts/mb-career-connect/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21639"
BASE_PATH = "/"
